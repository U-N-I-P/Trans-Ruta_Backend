                tipoVehiculo:
                  type: string
                  enum: [CAMION_CARGA_PESADA, TURBO, CAMIONETA]
      responses:
        '200':
          description: Plan actualizado

    delete:
      tags:
        - Planes de Mantenimiento
      summary: Eliminar plan
