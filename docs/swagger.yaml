openapi: 3.0.0
info:
  title: Trans-Ruta API
  version: 1.0.0
  description: API RESTful para el sistema de gestión logística y transporte de carga Trans-Ruta
  contact:
    name: Equipo Backend Trans-Ruta
    email: backend@trans-ruta.com

servers:
  - url: http://localhost:3000/api/v1
    description: Servidor de Desarrollo
  - url: https://api.trans-ruta.com/api/v1
    description: Servidor de Producción

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Ingrese el token JWT obtenido del endpoint /auth/login

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operación realizada con éxito
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Error en la operación
        errors:
          type: array
          items:
            type: object

security:
  - bearerAuth: []

tags:
  - name: Autenticación
    description: Endpoints de autenticación y registro
  - name: Usuarios
    description: Gestión de usuarios del sistema (solo ADMINISTRADOR)
  - name: Vehículos
    description: Gestión de flota vehicular (HU-01)
  - name: Conductores
    description: Gestión de conductores y licencias
  - name: Viáticos
    description: Asignación de presupuesto de viáticos a viajes (HU-10, HU-11)
  - name: Órdenes de Despacho
    description: Planificación y despacho de viajes (HU-03 a HU-05)
  - name: Entregas
    description: Registro de entregas con firma digital (HU-06 a HU-08)
  - name: Incidentes
    description: Reporte de incidentes en ruta (HU-09)
  - name: Planes de Mantenimiento
    description: Planificación de mantenimiento preventivo y correctivo (HU-02)
  - name: Órdenes de Trabajo
    description: Gestión de órdenes de trabajo de taller (HU-02)
  - name: Repuestos
    description: Gestión de inventario de repuestos (HU-12)
  - name: Reportes
    description: Generación de reportes analíticos (HU-14)
  - name: Manifiestos
    description: Generación de manifiestos de carga (HU-04)
  - name: Clientes
    description: Gestión de clientes y consulta de envíos (HU-13)
  - name: Notificaciones
    description: Sistema de notificaciones automáticas (HU-13)
  - name: Documentos Vehiculares
    description: Gestión de documentos de vehículos (HU-15)
  - name: Consumo de Combustible
    description: Registro y seguimiento de consumo de combustible (HU-16)
  - name: Viáticos y Gastos
    description: Gestión de viáticos y gastos de conductores (HU-17)
  - name: Auditoría
    description: Consulta de logs de auditoría del sistema (HU-18)
  - name: Solicitudes de Compra
    description: Gestión de solicitudes de compra con flujo de aprobación (HU-19)
  - name: Sugerencias
    description: Sistema inteligente de sugerencias de asignación (HU-20)
  - name: Evaluaciones
    description: Sistema de evaluación de desempeño de conductores (HU-21)

paths:
  # ==================== AUTENTICACIÓN ====================
  /auth/login:
    post:
      tags:
        - Autenticación
      summary: Iniciar sesión
      description: |
        Autentica un usuario y devuelve un token JWT.
        
        **IMPORTANTE**: El token se guarda automáticamente en localStorage y se aplica a todas las peticiones.
        No necesitas copiar y pegar el token manualmente.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - correo
                - contrasena
              properties:
                correo:
                  type: string
                  format: email
                  example: admin@trans-ruta.com
                  description: Correo electrónico del usuario
                contrasena:
                  type: string
                  format: password
                  example: Admin1234!
                  description: Contraseña del usuario
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Inicio de sesión exitoso
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                        description: Token JWT (se guarda automáticamente)
                      usuario:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          nombre:
                            type: string
                            example: Juan Pérez
                          correo:
                            type: string
                            example: admin@trans-ruta.com
                          rol:
                            type: string
                            enum: [ADMINISTRADOR, DESPACHADOR, CONDUCTOR, JEFE_TALLER, GESTOR_INVENTARIO, AUDITOR]
                            example: ADMINISTRADOR
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Correo o contraseña incorrectos

  /auth/logout:
    post:
      tags:
        - Autenticación
      summary: Cerrar sesión
      description: |
        Cierra la sesión del usuario actual y registra el evento en auditoría.
        
        **IMPORTANTE**: El token se elimina automáticamente de localStorage.
      responses:
        '200':
          description: Sesión cerrada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Sesión cerrada exitosamente
                  data:
                    type: object
                    nullable: true
                    example: null
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags:
        - Autenticación
      summary: Obtener usuario autenticado
      description: Devuelve la información del usuario actualmente autenticado
      responses:
        '200':
          description: Usuario obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Usuario autenticado
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      nombre:
                        type: string
                      correo:
                        type: string
                      rol:
                        type: string
        '401':
          description: No autenticado

  /auth/refresh:
    post:
      tags:
        - Autenticación
      summary: Refrescar token
      description: Genera un nuevo token JWT para el usuario autenticado
      responses:
        '200':
          description: Token refrescado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string

  # ==================== USUARIOS ====================
  /usuarios:
    get:
      tags:
        - Usuarios
      summary: Listar usuarios
      description: Solo ADMINISTRADOR. Obtiene lista paginada de usuarios.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Usuarios obtenidos exitosamente

    post:
      tags:
        - Usuarios
      summary: Crear usuario
      description: |
        Solo ADMINISTRADOR. No hay registro público — los usuarios se crean desde este endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
                - correo
                - contrasena
                - rol
              properties:
                nombre:
                  type: string
                  example: María García
                correo:
                  type: string
                  format: email
                  example: maria@trans-ruta.com
                contrasena:
                  type: string
                  format: password
                  example: Secure123!
                  description: Mínimo 8 caracteres
                rol:
                  type: string
                  enum: [ADMINISTRADOR, DESPACHADOR, CONDUCTOR, CLIENTE, JEFE_TALLER, GESTOR_INVENTARIO, AUDITOR]
                  example: DESPACHADOR
      responses:
        '201':
          description: Usuario creado exitosamente
        '400':
          description: Datos de entrada inválidos

  /usuarios/{id}:
    get:
      tags:
        - Usuarios
      summary: Obtener usuario por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuario obtenido
        '404':
          description: Usuario no encontrado

    put:
      tags:
        - Usuarios
      summary: Actualizar usuario
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                correo:
                  type: string
                  format: email
                contrasena:
                  type: string
                  format: password
                rol:
                  type: string
                  enum: [ADMINISTRADOR, DESPACHADOR, CONDUCTOR, CLIENTE, JEFE_TALLER, GESTOR_INVENTARIO, AUDITOR]
      responses:
        '200':
          description: Usuario actualizado

    delete:
      tags:
        - Usuarios
      summary: Eliminar usuario
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuario eliminado

  # ==================== VEHÍCULOS (HU-01) ====================
  /vehiculos:
    get:
      tags:
        - Vehículos
      summary: Listar vehículos
      description: Accesible por ADMINISTRADOR, DESPACHADOR y JEFE_TALLER
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Vehículos obtenidos exitosamente

    post:
      tags:
        - Vehículos
      summary: Crear vehículo
      description: Solo ADMINISTRADOR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - placa
                - tipo
                - capacidadCarga
                - estado
              properties:
                placa:
                  type: string
                  example: TRK-900
                  description: Formato colombiano (ABC-123 o AB-1234)
                tipo:
                  type: string
                  enum: [CAMION_CARGA_PESADA, TURBO, CAMIONETA]
                  example: CAMION_CARGA_PESADA
                capacidadCarga:
                  type: number
                  format: double
                  example: 15000
                  description: Capacidad en kg (debe ser > 0)
                estado:
                  type: string
                  enum: [DISPONIBLE, EN_RUTA, EN_MANTENIMIENTO, FUERA_DE_SERVICIO]
                  example: DISPONIBLE
      responses:
        '201':
          description: Vehículo creado exitosamente
        '400':
          description: Datos de entrada inválidos

  /vehiculos/{id}:
    get:
      tags:
        - Vehículos
      summary: Obtener vehículo por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Vehículo obtenido
        '404':
          description: Vehículo no encontrado

    put:
      tags:
        - Vehículos
      summary: Actualizar vehículo
      description: Solo ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                placa:
                  type: string
                tipo:
                  type: string
                  enum: [CAMION_CARGA_PESADA, TURBO, CAMIONETA]
                capacidadCarga:
                  type: number
                  format: double
                estado:
                  type: string
                  enum: [DISPONIBLE, EN_RUTA, EN_MANTENIMIENTO, FUERA_DE_SERVICIO]
      responses:
        '200':
          description: Vehículo actualizado

    delete:
      tags:
        - Vehículos
      summary: Eliminar vehículo
      description: Solo ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Vehículo eliminado

  # ==================== CONDUCTORES ====================
  /conductores/licencias-por-vencer:
    get:
      tags:
        - Conductores
      summary: Listar conductores con licencias por vencer
      description: Accesible por ADMINISTRADOR y DESPACHADOR. Devuelve conductores cuya licencia está próxima a vencer.
      responses:
        '200':
          description: Conductores con licencias por vencer obtenidos

  /conductores:
    get:
      tags:
        - Conductores
      summary: Listar conductores
      description: Accesible por ADMINISTRADOR y DESPACHADOR
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Conductores obtenidos exitosamente

    post:
      tags:
        - Conductores
      summary: Crear conductor
      description: Solo ADMINISTRADOR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
                - apellido
                - cedula
                - numeroLicencia
                - categoriaLicencia
                - fechaVencimientoLicencia
              properties:
                nombre:
                  type: string
                  example: Carlos
                apellido:
                  type: string
                  example: Rodríguez
                cedula:
                  type: string
                  example: '1234567890'
                  description: Debe ser numérica
                numeroLicencia:
                  type: string
                  example: '12345678'
                categoriaLicencia:
                  type: string
                  enum: [B1, B2, C1, C2, C3]
                  example: C2
                fechaVencimientoLicencia:
                  type: string
                  format: date
                  example: '2027-12-31'
                  description: Debe ser fecha futura
                usuarioId:
                  type: integer
                  example: 5
                  description: ID del usuario asociado al conductor
      responses:
        '201':
          description: Conductor creado exitosamente
        '400':
          description: Datos de entrada inválidos

  /conductores/{id}:
    get:
      tags:
        - Conductores
      summary: Obtener conductor por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Conductor obtenido
        '404':
          description: Conductor no encontrado

    put:
      tags:
        - Conductores
      summary: Actualizar conductor
      description: Solo ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                apellido:
                  type: string
                cedula:
                  type: string
                fechaVencimientoLicencia:
                  type: string
                  format: date
      responses:
        '200':
          description: Conductor actualizado

    delete:
      tags:
        - Conductores
      summary: Eliminar conductor
      description: Solo ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Conductor eliminado

  # ==================== VIÁTICOS (HU-10, HU-11) ====================
  /viaticos:
    get:
      tags:
        - Viáticos
      summary: Listar viáticos
      description: Accesible por ADMINISTRADOR, DESPACHADOR y CONDUCTOR
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Viáticos obtenidos exitosamente

    post:
      tags:
        - Viáticos
      summary: Asignar viático a un viaje
      description: Solo ADMINISTRADOR y DESPACHADOR. El monto se convierte automáticamente en el saldo inicial.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - monto
                - fecha
                - estado
                - conductorId
              properties:
                monto:
                  type: number
                  format: double
                  example: 500000
                  description: Monto del viático (debe ser > 0). Será el saldo inicial.
                fecha:
                  type: string
                  format: date
                  example: '2026-05-13'
                estado:
                  type: string
                  enum: [PENDIENTE, APROBADO, RECHAZADO, PAGADO]
                  example: APROBADO
                conductorId:
                  type: integer
                  example: 5
                ordenDeDespachoId:
                  type: integer
                  example: 3
      responses:
        '201':
          description: Viático creado exitosamente

  /viaticos/{id}:
    get:
      tags:
        - Viáticos
      summary: Obtener viático por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Viático obtenido
        '404':
          description: Viático no encontrado

    put:
      tags:
        - Viáticos
      summary: Actualizar viático
      description: Solo ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                monto:
                  type: number
                  format: double
                fecha:
                  type: string
                  format: date
                estado:
                  type: string
                  enum: [PENDIENTE, APROBADO, RECHAZADO, PAGADO]
      responses:
        '200':
          description: Viático actualizado

    delete:
      tags:
        - Viáticos
      summary: Eliminar viático
      description: Solo ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Viático eliminado

  # ==================== ÓRDENES DE DESPACHO (HU-03 a HU-05) ====================
  /ordenes-despacho:
    get:
      tags:
        - Órdenes de Despacho
      summary: Listar órdenes de despacho
      description: Accesible por ADMINISTRADOR, DESPACHADOR, CONDUCTOR y AUDITOR
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Órdenes obtenidas exitosamente

    post:
      tags:
        - Órdenes de Despacho
      summary: Crear orden de despacho
      description: |
        Solo DESPACHADOR y ADMINISTRADOR.
        ⚠️ Si el vehículo tiene documentos vencidos o la carga supera el límite, devuelve Status 400.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - origen
                - destino
                - pesoCarga
                - conductorId
                - vehiculoId
                - clienteId
              properties:
                origen:
                  type: string
                  example: Bogotá
                destino:
                  type: string
                  example: Medellín
                pesoCarga:
                  type: number
                  format: double
                  example: 12000
                  description: Peso en kg (debe ser > 0)
                descripcionCarga:
                  type: string
                  example: Materiales de construcción
                conductorId:
                  type: integer
                  example: 5
                vehiculoId:
                  type: integer
                  example: 2
                clienteId:
                  type: integer
                  example: 8
                fechaEntregaEstimada:
                  type: string
                  format: date
                fechaSalida:
                  type: string
                  format: date
      responses:
        '201':
          description: Orden de despacho creada exitosamente
        '400':
          description: Datos inválidos o restricciones de negocio no cumplidas

  /ordenes-despacho/{id}:
    get:
      tags:
        - Órdenes de Despacho
      summary: Obtener orden por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Orden obtenida
        '404':
          description: Orden no encontrada

    put:
      tags:
        - Órdenes de Despacho
      summary: Actualizar orden
      description: Solo DESPACHADOR y ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                origen:
                  type: string
                destino:
                  type: string
                pesoCarga:
                  type: number
                  format: double
      responses:
        '200':
          description: Orden actualizada

    delete:
      tags:
        - Órdenes de Despacho
      summary: Eliminar orden
      description: Solo ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Orden eliminada

  /ordenes-despacho/{id}/estado:
    patch:
      tags:
        - Órdenes de Despacho
      summary: Cambiar estado del viaje
      description: CONDUCTOR y DESPACHADOR pueden cambiar el estado de una orden
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - estado
              properties:
                estado:
                  type: string
                  enum: [DESPACHADO, EN_RUTA, CERCA_DEL_DESTINO, ENTREGADO, CANCELADO]
                  example: EN_RUTA
      responses:
        '200':
          description: Estado actualizado exitosamente
        '400':
          description: Estado inválido

  /ordenes-despacho/conductor/{id}:
    get:
      tags:
        - Órdenes de Despacho
      summary: Listar órdenes de un conductor
      description: Accesible por ADMINISTRADOR, DESPACHADOR y CONDUCTOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID del conductor
      responses:
        '200':
          description: Órdenes del conductor obtenidas

  # ==================== ENTREGAS (HU-06 a HU-08) ====================
  /entregas:
    get:
      tags:
        - Entregas
      summary: Listar entregas
      description: Accesible por ADMINISTRADOR, DESPACHADOR, CLIENTE y AUDITOR
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Entregas obtenidas exitosamente

  /entregas/{id}:
    get:
      tags:
        - Entregas
      summary: Obtener entrega por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Entrega obtenida
        '404':
          description: Entrega no encontrada

    delete:
      tags:
        - Entregas
      summary: Eliminar entrega
      description: Solo ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Entrega eliminada

  /entregas/{ordenId}/registrar:
    post:
      tags:
        - Entregas
      summary: Registrar entrega con firma digital
      description: |
        Solo CONDUCTOR. Finaliza un viaje registrando la entrega.
        Puede incluir firma digital del cliente en formato base64.
      parameters:
        - in: path
          name: ordenId
          required: true
          schema:
            type: integer
          description: ID de la orden de despacho
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fechaEntrega
              properties:
                fechaEntrega:
                  type: string
                  format: date
                  example: '2026-05-12'
                firmaDigital:
                  type: string
                  description: Firma del cliente en formato base64
                  example: 'data:image/png;base64,ivBORw0KGgoAAAANSU...'
                observaciones:
                  type: string
                  example: Entrega sin novedad
      responses:
        '201':
          description: Entrega registrada exitosamente
        '400':
          description: Datos inválidos

  # ==================== INCIDENTES (HU-09) ====================
  /incidentes:
    get:
      tags:
        - Incidentes
      summary: Listar incidentes
      description: Accesible por ADMINISTRADOR, DESPACHADOR y AUDITOR
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Incidentes obtenidos exitosamente

  /incidentes/{id}:
    get:
      tags:
        - Incidentes
      summary: Obtener incidente por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Incidente obtenido
        '404':
          description: Incidente no encontrado

    delete:
      tags:
        - Incidentes
      summary: Eliminar incidente
      description: Solo ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Incidente eliminado

  /incidentes/{ordenId}/reportar:
    post:
      tags:
        - Incidentes
      summary: Reportar incidente en ruta
      description: Solo CONDUCTOR. Reporta un choque, falla mecánica u otro incidente durante un viaje.
      parameters:
        - in: path
          name: ordenId
          required: true
          schema:
            type: integer
          description: ID de la orden de despacho
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tipo
                - descripcion
                - fecha
              properties:
                tipo:
                  type: string
                  example: FALLA_MECANICA
                  description: Tipo de incidente
                descripcion:
                  type: string
                  example: Se pinchó una llanta en la vía
                fecha:
                  type: string
                  format: date
                  example: '2026-05-12'
                nivelGravedad:
                  type: string
                  enum: [BAJO, MEDIO, ALTO, CRITICO]
                  example: ALTO
      responses:
        '201':
          description: Incidente reportado exitosamente
        '400':
          description: Datos inválidos

  # ==================== DOCUMENTOS VEHICULARES (HU-15) ====================
  /documentos-vehiculares/alertas:
    get:
      tags:
        - Documentos Vehiculares
      summary: Obtener alertas de documentos por vencer
      description: Devuelve documentos que vencen en los próximos 30 días con nivel de alerta
      responses:
        '200':
          description: Alertas obtenidas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Alertas de vencimiento obtenidas
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 5
                        vehiculoId:
                          type: integer
                          example: 2
                        placa:
                          type: string
                          example: TRK-900
                        tipo:
                          type: string
                          enum: [SOAT, TECNOMECANICA, REVISION_GASES, POLIZA, TARJETA_OPERACION]
                          example: SOAT
                        fechaVencimiento:
                          type: string
                          format: date
                          example: '2026-05-20'
                        diasFaltantes:
                          type: integer
                          example: 8
                        nivelAlerta:
                          type: string
                          enum: [INFO, ALERTA, CRITICO]
                          example: ALERTA
                          description: CRITICO (≤7 días), ALERTA (≤15 días), INFO (≤30 días)

  /documentos-vehiculares:
    get:
      tags:
        - Documentos Vehiculares
      summary: Listar documentos vehiculares
      description: Obtiene lista paginada de documentos vehiculares
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: vehiculoId
          schema:
            type: integer
          description: Filtrar por vehículo específico
      responses:
        '200':
          description: Documentos obtenidos exitosamente

    post:
      tags:
        - Documentos Vehiculares
      summary: Crear documento vehicular
      description: Registra un nuevo documento para un vehículo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tipo
                - numero
                - fechaExpedicion
                - fechaVencimiento
                - vehiculoId
              properties:
                tipo:
                  type: string
                  enum: [SOAT, TECNOMECANICA, REVISION_GASES, POLIZA, TARJETA_OPERACION]
                  example: SOAT
                numero:
                  type: string
                  example: '888999'
                fechaExpedicion:
                  type: string
                  format: date
                  example: '2025-05-10'
                fechaVencimiento:
                  type: string
                  format: date
                  example: '2026-05-10'
                archivoAdjunto:
                  type: string
                  example: https://storage.trans-ruta.com/docs/soat-888999.pdf
                vehiculoId:
                  type: integer
                  example: 2
      responses:
        '201':
          description: Documento creado exitosamente

  /documentos-vehiculares/{id}:
    get:
      tags:
        - Documentos Vehiculares
      summary: Obtener documento por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Documento obtenido
        '404':
          description: Documento no encontrado

    put:
      tags:
        - Documentos Vehiculares
      summary: Actualizar documento
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Documento actualizado

    delete:
      tags:
        - Documentos Vehiculares
      summary: Eliminar documento
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Documento eliminado

  # ==================== CONSUMO DE COMBUSTIBLE (HU-16) ====================
  /consumos-combustible:
    get:
      tags:
        - Consumo de Combustible
      summary: Listar registros de consumo
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Registros obtenidos

    post:
      tags:
        - Consumo de Combustible
      summary: Registrar consumo de combustible
      description: |
        Registra una carga de combustible. El sistema calcula automáticamente:
        - Distancia recorrida (kilometrajeFinal - kilometrajeInicial)
        - Rendimiento (Km/L)
        - Genera alerta si el rendimiento es 20% menor al promedio histórico
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - kilometrajeInicial
                - kilometrajeFinal
                - litrosCargados
                - costoTotal
                - ordenDeDespachoId
              properties:
                kilometrajeInicial:
                  type: number
                  format: double
                  example: 120000
                kilometrajeFinal:
                  type: number
                  format: double
                  example: 120500
                litrosCargados:
                  type: number
                  format: double
                  example: 85.0
                costoTotal:
                  type: number
                  format: double
                  example: 320000
                ordenDeDespachoId:
                  type: integer
                  example: 5
                evidenciaFotografica:
                  type: string
                  example: https://storage.trans-ruta.com/evidencias/ticket-123.jpg
      responses:
        '201':
          description: Consumo registrado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Registro de consumo creado (ALERTA Rendimiento 20% por debajo del promedio)
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      rendimiento:
                        type: number
                        description: Calculado automáticamente (Km/L)
                      distanciaRecorrida:
                        type: number
                        description: Calculado automáticamente
                      vehiculoId:
                        type: integer

  /consumos-combustible/vehiculo/{vehiculoId}:
    get:
      tags:
        - Consumo de Combustible
      summary: Obtener historial de consumo por vehículo
      description: Útil para gráficas de rendimiento en el tiempo
      parameters:
        - in: path
          name: vehiculoId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Historial obtenido

  # ==================== VIÁTICOS Y GASTOS (HU-17) ====================
  /gastos-viaticos:
    post:
      tags:
        - Viáticos y Gastos
      summary: Registrar gasto de viático
      description: El conductor registra un gasto individual (estado PENDIENTE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - viaticoId
                - monto
                - categoria
              properties:
                viaticoId:
                  type: integer
                  example: 1
                monto:
                  type: number
                  format: double
                  example: 25000
                categoria:
                  type: string
                  enum: [COMBUSTIBLE, PEAJES, ALIMENTACION, HOSPEDAJE, OTROS]
                  example: PEAJES
                descripcion:
                  type: string
                  example: Peaje Bogotá
                evidenciaFotografica:
                  type: string
                  example: https://url-del-ticket.jpg
      responses:
        '201':
          description: Gasto registrado correctamente

  /gastos-viaticos/viatico/{viaticoId}:
    get:
      tags:
        - Viáticos y Gastos
      summary: Obtener gastos de un viático
      parameters:
        - in: path
          name: viaticoId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Gastos obtenidos

  /gastos-viaticos/{id}/aprobar:
    patch:
      tags:
        - Viáticos y Gastos
      summary: Aprobar gasto
      description: |
        El administrador aprueba el gasto. El sistema:
        - Actualiza el saldo del viático automáticamente
        - Genera alerta si el saldo es < 10% del monto o negativo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comentariosAdmin:
                  type: string
                  example: Todo en orden
      responses:
        '200':
          description: Gasto aprobado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: Gasto aprobado correctamente (ALERTA Saldo menor al 10% del monto o negativo)

  /gastos-viaticos/{id}/rechazar:
    patch:
      tags:
        - Viáticos y Gastos
      summary: Rechazar gasto
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - comentariosAdmin
              properties:
                comentariosAdmin:
                  type: string
                  example: Gasto no justificado
      responses:
        '200':
          description: Gasto rechazado

  # ==================== AUDITORÍA (HU-18) ====================
  /auditoria:
    get:
      tags:
        - Auditoría
      summary: Listar logs de auditoría
      description: Solo accesible para ADMINISTRADOR y AUDITOR
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: usuarioId
          schema:
            type: integer
          description: Filtrar por usuario
        - in: query
          name: accion
          schema:
            type: string
            enum: [CREATE, UPDATE, DELETE, APPROVE, REJECT, ASSIGN, LOGIN, LOGOUT]
          description: Filtrar por tipo de acción
        - in: query
          name: entidad
          schema:
            type: string
          description: Filtrar por entidad (ej SolicitudDeCompra)
        - in: query
          name: fechaInicio
          schema:
            type: string
            format: date
          description: Fecha inicio (YYYY-MM-DD)
        - in: query
          name: fechaFin
          schema:
            type: string
            format: date
          description: Fecha fin (YYYY-MM-DD)
      responses:
        '200':
          description: Registros de auditoría obtenidos
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        usuario:
                          type: object
                        accion:
                          type: string
                        entidad:
                          type: string
                        entidadId:
                          type: integer
                        ipAddress:
                          type: string
                        datosAnteriores:
                          type: object
                        datosNuevos:
                          type: object
                        createdAt:
                          type: string
                          format: date-time
                  pagination:
                    type: object

  /auditoria/{id}:
    get:
      tags:
        - Auditoría
      summary: Ver detalle de un log
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Log obtenido

  /auditoria/exportar:
    get:
      tags:
        - Auditoría
      summary: Exportar auditoría
      description: Exporta logs en formato CSV o PDF
      parameters:
        - in: query
          name: formato
          required: true
          schema:
            type: string
            enum: [csv, pdf]
          description: csv (hasta 2000 registros) o pdf (hasta 400 registros)
        - in: query
          name: fechaInicio
          schema:
            type: string
            format: date
        - in: query
          name: fechaFin
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Archivo descargable
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary

  # ==================== SOLICITUDES DE COMPRA (HU-19) ====================
  /solicitudes-compra/pendientes:
    get:
      tags:
        - Solicitudes de Compra
      summary: Listar solicitudes pendientes de aprobación
      description: Solo ADMINISTRADOR. Devuelve solicitudes con monto > $500,000
      responses:
        '200':
          description: Solicitudes pendientes obtenidas

  /solicitudes-compra/{repuestoId}:
    post:
      tags:
        - Solicitudes de Compra
      summary: Crear solicitud de compra
      description: |
        Crea una solicitud de compra. El sistema:
        - Calcula el monto total automáticamente (cantidad * costoEstimado)
        - Si monto ≤ $500,000 → APROBADA automáticamente
        - Si monto > $500,000 → PENDIENTE (requiere aprobación manual)
      parameters:
        - in: path
          name: repuestoId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cantidad
                - costoEstimado
              properties:
                cantidad:
                  type: integer
                  example: 5
                costoEstimado:
                  type: number
                  format: double
                  example: 450000
                descripcion:
                  type: string
                  example: Filtros de aceite para mantenimiento preventivo
      responses:
        '201':
          description: Solicitud creada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      estado:
                        type: string
                        example: APROBADA
                        description: APROBADA (automática) o PENDIENTE (requiere aprobación)
                      montoTotal:
                        type: number
                      comentariosAprobacion:
                        type: string

  /solicitudes-compra/{id}/aprobar:
    patch:
      tags:
        - Solicitudes de Compra
      summary: Aprobar solicitud
      description: Solo ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comentarios:
                  type: string
                  example: Aprobado por necesidad urgente
      responses:
        '200':
          description: Solicitud aprobada

  /solicitudes-compra/{id}/rechazar:
    patch:
      tags:
        - Solicitudes de Compra
      summary: Rechazar solicitud
      description: Solo ADMINISTRADOR. Comentarios obligatorios
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - comentarios
              properties:
                comentarios:
                  type: string
                  example: Presupuesto insuficiente este mes
      responses:
        '200':
          description: Solicitud rechazada

  /solicitudes-compra/{id}/recibir:
    patch:
      tags:
        - Solicitudes de Compra
      summary: Registrar recepción de repuestos
      description: |
        Solo GESTOR_INVENTARIO o ADMINISTRADOR.
        Al registrar la recepción, el inventario se actualiza automáticamente.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Recepción registrada, inventario actualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      estado:
                        type: string
                        example: RECIBIDA
                      fechaRecepcion:
                        type: string
                        format: date-time
                      repuesto:
                        type: object
                        properties:
                          stockActual:
                            type: integer
                            description: Actualizado automáticamente

  # ==================== SUGERENCIAS (HU-20) ====================
  /sugerencias:
    get:
      tags:
        - Sugerencias
      summary: Obtener sugerencias de asignación
      description: |
        Solo ADMINISTRADOR y DESPACHADOR.
        Sistema inteligente que sugiere las mejores combinaciones vehículo-conductor basado en:
        - Capacidad de carga óptima
        - Estado del vehículo y documentos vigentes
        - Licencia y categoría del conductor
        - Descanso del conductor (mínimo 8 horas)
        - Experiencia en la ruta
        - Historial de incidentes
      parameters:
        - in: query
          name: pesoCarga
          required: true
          schema:
            type: number
            format: double
          description: Peso de la carga en kg
          example: 12000
        - in: query
          name: origen
          required: true
          schema:
            type: string
          description: Ciudad de origen (3-200 caracteres)
          example: Bogotá
        - in: query
          name: destino
          required: true
          schema:
            type: string
          description: Ciudad de destino (3-200 caracteres)
          example: Medellín
        - in: query
          name: limite
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
          description: Número de sugerencias a retornar
      responses:
        '200':
          description: Sugerencias obtenidas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        vehiculo:
                          type: object
                        conductor:
                          type: object
                        scoreVehiculo:
                          type: integer
                          description: Score del vehículo (0-100)
                        scoreConductor:
                          type: integer
                          description: Score del conductor (0-100)
                        scoreCombinado:
                          type: integer
                          description: Score combinado (60% vehículo + 40% conductor)
                        detallesVehiculo:
                          type: array
                          items:
                            type: string
                        detallesConductor:
                          type: array
                          items:
                            type: string
                        justificacion:
                          type: string
        '400':
          description: Parámetros inválidos

  # ==================== EVALUACIONES (HU-21) ====================
  /evaluaciones/generar:
    post:
      tags:
        - Evaluaciones
      summary: Generar evaluaciones mensuales
      description: |
        Solo ADMINISTRADOR.
        Genera evaluaciones para todos los conductores de un periodo.
        Sistema de scoring:
        - Puntualidad (30%): Entregas a tiempo vs total
        - Incidentes (25%): 0 incidentes = 25 pts, escala descendente
        - Combustible (20%): Comparado con promedio del tipo de vehículo
        - Calificación clientes (15%): Reservado para implementación futura
        - Cumplimiento protocolos (10%): Entregas con firma digital
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - periodo
              properties:
                periodo:
                  type: string
                  pattern: ^\d{4}-\d{2}$
                  example: '2026-05'
                  description: Formato YYYY-MM
      responses:
        '201':
          description: Evaluaciones generadas exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      evaluaciones:
                        type: array
                      errores:
                        type: array
                      resumen:
                        type: object
                        properties:
                          total:
                            type: integer
                          exitosas:
                            type: integer
                          fallidas:
                            type: integer

  /evaluaciones/ranking:
    get:
      tags:
        - Evaluaciones
      summary: Obtener ranking de conductores
      description: Solo ADMINISTRADOR. Útil para tabla de posiciones
      parameters:
        - in: query
          name: periodo
          required: true
          schema:
            type: string
            pattern: ^\d{4}-\d{2}$
          example: '2026-05'
      responses:
        '200':
          description: Ranking obtenido exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        posicion:
                          type: integer
                        conductor:
                          type: object
                        scoreTotal:
                          type: number
                        entregasTotales:
                          type: integer
                        entregasATiempo:
                          type: integer
                        incidentesTotales:
                          type: integer
                        rendimientoPromedio:
                          type: number
                        porcentajePuntualidad:
                          type: integer

  /evaluaciones/conductor/{conductorId}/{periodo}:
    get:
      tags:
        - Evaluaciones
      summary: Ver evaluación de un conductor
      description: ADMINISTRADOR puede ver cualquiera. CONDUCTOR solo la suya.
      parameters:
        - in: path
          name: conductorId
          required: true
          schema:
            type: integer
        - in: path
          name: periodo
          required: true
          schema:
            type: string
            pattern: ^\d{4}-\d{2}$
          example: '2026-05'
      responses:
        '200':
          description: Evaluación obtenida exitosamente
        '403':
          description: No tienes permiso para ver esta evaluación
        '404':
          description: Evaluación no encontrada

  /evaluaciones/conductor/{conductorId}/historial:
    get:
      tags:
        - Evaluaciones
      summary: Ver historial de evaluaciones
      description: ADMINISTRADOR puede ver cualquiera. CONDUCTOR solo el suyo. Útil para gráficas de evolución.
      parameters:
        - in: path
          name: conductorId
          required: true
          schema:
            type: integer
        - in: query
          name: limite
          schema:
            type: integer
            minimum: 1
            maximum: 24
            default: 12
          description: Número de evaluaciones a retornar
      responses:
        '200':
          description: Historial obtenido exitosamente

  /evaluaciones/{id}/comentarios:
    patch:
      tags:
        - Evaluaciones
      summary: Agregar comentarios del administrador
      description: Solo ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - comentarios
              properties:
                comentarios:
                  type: string
                  minLength: 10
                  maxLength: 2000
                  example: Excelente desempeño este mes. Mantener el nivel.
      responses:
        '200':
          description: Comentarios agregados exitosamente

  # ==================== CLIENTES Y NOTIFICACIONES (HU-13) ====================
  /clientes:
    get:
      tags:
        - Clientes
      summary: Listar clientes
      description: Obtiene lista paginada de clientes
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Clientes obtenidos exitosamente

    post:
      tags:
        - Clientes
      summary: Crear cliente
