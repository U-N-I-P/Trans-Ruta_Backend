                  format: double
                  example: 45000
                  description: Precio unitario (debe ser > 0)
                stockActual:
                  type: integer
                  example: 20
                descripcion:
                  type: string
                  example: Compatible con motores diésel Cummins ISX
      responses:
        '201':
          description: Repuesto creado exitosamente
        '400':
          description: Datos inválidos

  /repuestos/{id}:
    get:
      tags:
        - Repuestos
      summary: Obtener repuesto por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Repuesto obtenido
        '404':
          description: Repuesto no encontrado

    put:
      tags:
        - Repuestos
      summary: Actualizar repuesto
      description: Solo GESTOR_INVENTARIO y ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                stockMinimo:
                  type: integer
                precio:
                  type: number
                  format: double
      responses:
        '200':
          description: Repuesto actualizado

