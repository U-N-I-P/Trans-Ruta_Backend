          schema:
            type: integer
      responses:
        '200':
          description: Plan obtenido
        '404':
          description: Plan no encontrado

    put:
      tags:
        - Planes de Mantenimiento
      summary: Actualizar plan
      description: Solo ADMINISTRADOR y JEFE_TALLER
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
