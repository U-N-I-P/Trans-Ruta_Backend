          description: Repuestos con stock bajo obtenidos

  /repuestos:
    get:
      tags:
        - Repuestos
      summary: Listar repuestos
      description: Accesible por ADMINISTRADOR, JEFE_TALLER y GESTOR_INVENTARIO
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
