  # ==================== ÓRDENES DE TRABAJO (HU-02) ====================
  /ordenes-trabajo:
    get:
      tags:
        - Órdenes de Trabajo
      summary: Listar órdenes de trabajo
      description: Accesible por ADMINISTRADOR, JEFE_TALLER y AUDITOR
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Órdenes de trabajo obtenidas

    post:
      tags:
        - Órdenes de Trabajo
      summary: Crear orden de trabajo
      description: Solo JEFE_TALLER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - descripcion
                - fechaApertura
              properties:
                descripcion:
                  type: string
                  example: Reparación de transmisión del vehículo TRK-900
                fechaApertura:
                  type: string
                  format: date
                  example: '2026-05-13'
                vehiculoId:
                  type: integer
                  example: 2
                planDeMantenimientoId:
                  type: integer
                  example: 1
      responses:
        '201':
          description: Orden de trabajo creada
        '400':
          description: Datos inválidos

  /ordenes-trabajo/{id}:
    get:
      tags:
        - Órdenes de Trabajo
      summary: Obtener orden de trabajo por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Orden de trabajo obtenida
        '404':
          description: Orden de trabajo no encontrada

    put:
      tags:
        - Órdenes de Trabajo
      summary: Actualizar orden de trabajo
      description: Solo JEFE_TALLER. Puede cambiar el estado de la orden.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                estado:
                  type: string
                  enum: [ABIERTA, EN_PROCESO, CERRADA, CANCELADA]
                descripcion:
                  type: string
      responses:
        '200':
          description: Orden de trabajo actualizada

    delete:
      tags:
        - Órdenes de Trabajo
      summary: Eliminar orden de trabajo
      description: Solo ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Orden de trabajo eliminada

