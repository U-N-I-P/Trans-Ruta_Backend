  # ==================== MANIFIESTOS (HU-04) ====================
  /manifiestos/{ordenId}:
    get:
      tags:
        - Manifiestos
      summary: Generar manifiesto de carga
      description: |
        Accesible por ADMINISTRADOR, DESPACHADOR y AUDITOR.
        Genera el documento de manifiesto de carga asociado a una orden de despacho.
        El manifiesto incluye datos del vehículo, conductor, cliente, origen, destino y peso.
      parameters:
        - in: path
          name: ordenId
          required: true
          schema:
            type: integer
          description: ID de la orden de despacho
      responses:
        '200':
          description: Manifiesto generado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      ordenId:
                        type: integer
                      conductor:
                        type: string
                      vehiculo:
                        type: string
                      placa:
                        type: string
                      cliente:
                        type: string
                      origen:
                        type: string
                      destino:
                        type: string
                      pesoCarga:
                        type: number
                      fechaSalida:
                        type: string
                      estado:
                        type: string
        '404':
          description: Orden de despacho no encontrada
