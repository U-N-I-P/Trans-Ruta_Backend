    get:
      tags:
        - Reportes
      summary: Reporte de cumplimiento de entregas
      description: Muestra el porcentaje de entregas a tiempo vs retrasadas
      responses:
        '200':
          description: Reporte de cumplimiento generado

  /reportes/{id}:
    get:
      tags:
        - Reportes
      summary: Obtener reporte por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reporte obtenido
        '404':
          description: Reporte no encontrado

    delete:
      tags:
        - Reportes
      summary: Eliminar reporte
      description: Solo ADMINISTRADOR
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reporte eliminado

  /reportes/generar:
    post:
      tags:
        - Reportes
      summary: Generar reporte
      description: Solo ADMINISTRADOR y DESPACHADOR. Genera un reporte en formato JSON, CSV o PDF.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tipo
              properties:
                tipo:
                  type: string
                  enum: [COMBUSTIBLE, RUTAS_RENTABLES, CUMPLIMIENTO_ENTREGAS, MANTENIMIENTO, INVENTARIO]
                  example: COMBUSTIBLE
                formato:
                  type: string
                  enum: [JSON, CSV, PDF]
                  example: PDF
                  default: JSON
                fechaInicio:
                  type: string
                  format: date
                  example: '2026-01-01'
                fechaFin:
                  type: string
                  format: date
                  example: '2026-05-13'
      responses:
        '201':
