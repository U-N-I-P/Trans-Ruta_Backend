      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
                - stockMinimo
                - unidadMedida
                - precio
              properties:
                nombre:
                  type: string
                  example: Filtro de aceite motor
                stockMinimo:
                  type: integer
